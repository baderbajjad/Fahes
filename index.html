<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص.ai — فحص احترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background: #F4F2ED; color: #0F0F1A; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app { max-width: 430px; width: 100%; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background: #0F0F1A; color: #E8B84B; padding: 30px 20px; text-align: center; }
        .content { padding: 20px; flex: 1; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .slot { border: 2px dashed #ddd; border-radius: 15px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .btn { width: 100%; padding: 18px; background: #E8B84B; border: none; border-radius: 12px; font-weight: 800; font-size: 18px; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; color: #E24B4A; }
    </style>
</head>
<body>
<div class="app">
    <div class="header"><h1>فاحص.ai</h1><p>كشف الطلاء والأضرار بالذكاء الاصطناعي</p></div>
    <div class="content">
        <div class="photo-grid">
            <div class="slot" onclick="upload(1)" id="s1"><span>اضف صورة</span></div>
            <div class="slot" onclick="upload(2)" id="s2"><span>اضف صورة</span></div>
        </div>
        <input type="file" id="f" hidden onchange="handle(event)" accept="image/*">
        <button class="btn" id="go" onclick="start()" disabled>ابدأ الفحص</button>
        <div id="status"></div>
    </div>
</div>

<script>
    let images = {}; let current = 0;
    function upload(n) { current = n; document.getElementById('f').click(); }
    function handle(e) {
        let fr = new FileReader();
        fr.onload = (ev) => {
            images[current] = ev.target.result.split(',')[1];
            document.getElementById('s'+current).innerHTML = `<img src="${ev.target.result}">`;
            if(Object.keys(images).length >= 1) document.getElementById('go').disabled = false;
        };
        fr.readAsDataURL(e.target.files[0]);
    }
    async function start() {
        document.getElementById('status').innerText = "جاري الفحص... انتظر قليلاً";
        document.getElementById('go').disabled = true;
        try {
            const res = await fetch('/api/analyze', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({images: Object.values(images)}) 
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);
            alert("تم الفحص! النتيجة: " + data.analysis);
            document.getElementById('status').innerText = "اكتمل الفحص";
        } catch(err) {
            document.getElementById('status').innerText = "خطأ: " + err.message;
            document.getElementById('go').disabled = false;
        }
    }
</script>
</body>
</html>
